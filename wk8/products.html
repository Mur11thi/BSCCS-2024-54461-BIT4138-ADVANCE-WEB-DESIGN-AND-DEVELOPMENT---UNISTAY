<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Showcase – MKU Hostel Essentials</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 class="page-title">Hostel Essentials</h1>

  <div class="product-grid">
    <!-- Product 1 -->
    <div class="product-card">
      <img src="product1.jpg" alt="Mattress"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      <div class="img-placeholder" style="display:none;">🛏️</div>
      <div class="product-info">
        <h3>Orthopaedic Mattress</h3>
        <p>High-density foam for sound sleep.</p>
        <span class="price">KSH 5,500</span>
      </div>
    </div>

    <!-- Product 2 -->
    <div class="product-card">
      <img src="product2.jpg" alt="Study Desk"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      <div class="img-placeholder" style="display:none;">🪑</div>
      <div class="product-info">
        <h3>Study Desk with Shelf</h3>
        <p>Compact, sturdy, perfect for hostels.</p>
        <span class="price">KSH 3,200</span>
      </div>
    </div>

    <!-- Product 3 -->
    <div class="product-card">
      <img src="product3.jpg" alt="Curtains"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      <div class="img-placeholder" style="display:none;">🪟</div>
      <div class="product-info">
        <h3>Blackout Curtains</h3>
        <p>Complete darkness for better sleep.</p>
        <span class="price">KSH 1,800</span>
      </div>
    </div>

    <!-- Product 4 -->
    <div class="product-card">
      <img src="product4.jpg" alt="Lamp"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      <div class="img-placeholder" style="display:none;">💡</div>
      <div class="product-info">
        <h3>LED Desk Lamp</h3>
        <p>Adjustable brightness, USB charging.</p>
        <span class="price">KSH 950</span>
      </div>
    </div>
  </div>

</body>
</html>
